name: Feature Request
description: Propose a new feature or capability
title: "[Feature]: "
labels: ["feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        Describe the feature you'd like to see. All features require explicit approval before implementation.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the current pain point?
      placeholder: Describe the problem or gap this addresses.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work? Be as specific as possible.
      placeholder: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why This Matters
      description: Who benefits and how? What's the impact?
      placeholder: Explain the value and urgency.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches were considered and why were they rejected?
      placeholder: List any alternatives you've thought about.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How will we know this feature is complete?
      placeholder: |
        - [ ] User can...
        - [ ] System handles...
    validations:
      required: true

  - type: checkboxes
    id: approval
    attributes:
      label: Approval Required
      description: This feature requires explicit approval before implementation begins.
      options:
        - label: I understand this feature will not be implemented until explicitly approved.
          required: true
